schema_version: 1
id: forgotten_armory
name: 忘れられた武器庫
image: forgotten_armory.png
act_pool: [1]
description: 朽ちた武器が並んでいる。まだ使えそうなものもある。
choices:
  - id: train
    text: 訓練する。カードを1枚選んで強化する。
    effects:
      - type: upgrade_card
        selector:
          zones:
            - master_deck
          count: 1
          player_choice: true
          filter:
            can_upgrade: true
  - id: sharpen
    text: 刃を研ぐ。攻撃カードを1枚選び、鋭利を付与する。
    effects:
      - type: apply_card_modifier
        modifier: sharp
        selector:
          zones:
            - master_deck
          count: 1
          player_choice: true
          filter:
            types:
              - attack
  - id: take_blade
    text: 刃を持ち出す。二連斬りを得る。
    effects:
      - type: add_card_to_deck
        card: double_cut
  - id: leave
    text: 触らずに進む。
    effects: []
