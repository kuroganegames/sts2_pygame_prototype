schema_version: 1
id: abyss_scholar
name: 深淵の学者
image: abyss_scholar.png
act_pool: [1, 2, 3]
weight: 70
description: 目のない学者が、失われた知識と代償を差し出す。
choices:
  - id: forbidden_lesson
    name: 禁じられた授業
    description: 最大HPを5失い、準備運動+をデッキに加える。
    effects:
      - type: max_hp
        amount: -5
      - type: add_card_to_deck
        card: preparation
        upgraded: true
  - id: abyssal_focus
    name: 深淵の集中
    description: 各ターン開始時、カードを1枚追加で引く。最大HPを8失う。
    effects:
      - type: max_hp
        amount: -8
    triggers:
      - event: turn_start
        effects:
          - type: draw_cards
            amount: 1
  - id: scholar_gift
    name: 学者の小瓶
    description: ひらめきポーションを得る。
    effects:
      - type: gain_potion
        potion: draw_potion
